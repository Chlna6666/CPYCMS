services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    container_name: cpycms-backend
    environment:
      CPYCMS_PORT: ${CPYCMS_PORT:-5000}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CPYCMS_DATABASE_FILE: ${CPYCMS_DATABASE_FILE:-/app/data/cpycms.db}
      CPYCMS_SQLITE_BUSY_TIMEOUT_MS: ${CPYCMS_SQLITE_BUSY_TIMEOUT_MS:-5000}
      CPYCMS_SQLITE_CACHE_KB: ${CPYCMS_SQLITE_CACHE_KB:-20000}
      CPYCMS_REFRESH_SEARCH_INDEX_ON_STARTUP: ${CPYCMS_REFRESH_SEARCH_INDEX_ON_STARTUP:-0}
      CPYCMS_UPLOAD_FOLDER: ${CPYCMS_UPLOAD_FOLDER:-/app/uploads}
      CPYCMS_FRONTEND_DIST: ${CPYCMS_FRONTEND_DIST:-/app/frontend/dist}
      CPYCMS_ALLOWED_HOSTS: ${CPYCMS_ALLOWED_HOSTS:-*}
      CPYCMS_CSRF_TRUSTED_ORIGINS: ${CPYCMS_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:5000,http://localhost:5000}
      CPYCMS_TRUST_PROXY_HEADERS: ${CPYCMS_TRUST_PROXY_HEADERS:-1}
      CPYCMS_USE_X_FORWARDED_HOST: ${CPYCMS_USE_X_FORWARDED_HOST:-1}
      CPYCMS_LOG_LEVEL: ${CPYCMS_LOG_LEVEL:-INFO}
      CPYCMS_LOG_DIR: ${CPYCMS_LOG_DIR:-/app/logs}
      CPYCMS_LOG_COLOR: ${CPYCMS_LOG_COLOR:-auto}
      CPYCMS_SLOW_REQUEST_MS: ${CPYCMS_SLOW_REQUEST_MS:-800}
      CPYCMS_LOG_BACKUP_DAYS: ${CPYCMS_LOG_BACKUP_DAYS:-14}
      CPYCMS_LOG_MAX_TOTAL_MB: ${CPYCMS_LOG_MAX_TOTAL_MB:-256}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    ports:
      - "${BACKEND_PORT:-5000}:${CPYCMS_PORT:-5000}"
    volumes:
      - cpycms-data:/app/data
      - cpycms-uploads:/app/uploads
      - cpycms-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('CPYCMS_PORT', '5000') + '/api/v1/init/check/', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  cpycms-data:
  cpycms-uploads:
  cpycms-logs:
